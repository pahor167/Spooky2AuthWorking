<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="#2a2a5e" stroke-width="4"/>
  <!-- Main sine wave -->
  <path d="M 70 256 Q 135 100, 200 256 Q 265 412, 330 256 Q 395 100, 440 256" 
        fill="none" stroke="url(#wave1)" stroke-width="28" stroke-linecap="round"/>
  <!-- Secondary wave (offset) -->
  <path d="M 70 256 Q 135 140, 200 256 Q 265 372, 330 256 Q 395 140, 440 256" 
        fill="none" stroke="url(#wave2)" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  <!-- Pulse dots -->
  <circle cx="70" cy="256" r="10" fill="#00d4ff"/>
  <circle cx="440" cy="256" r="10" fill="#ff2d95"/>
  <!-- Frequency text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" 
        font-size="48" font-weight="bold" fill="#ffffff" opacity="0.6">Hz</text>
</svg>
